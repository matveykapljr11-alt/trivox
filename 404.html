<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: #050608; color: #f4f4f4; font-family: 'Barlow Condensed', sans-serif; }
body::before {
  content: ''; position: fixed; inset: 0;
  background: repeating-linear-gradient(45deg, transparent, transparent 1px, rgba(255,255,255,0.012) 1px, rgba(255,255,255,0.012) 2px);
  pointer-events: none; z-index: 0;
}
nav {
  position: fixed; top: 0; left: 0; right: 0; height: 52px;
  background: rgba(5,6,8,0.92); backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(200,200,200,0.08);
  display: flex; align-items: center; padding: 0 24px; z-index: 100;
}
.nav-logo {
  font-weight: 900; font-size: 19px; letter-spacing: 0.14em;
  background: linear-gradient(135deg, #c8c8c8 0%, #888 40%, #c0c0c0 60%, #707070 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; text-decoration: none;
}
.scene-wrap { position: fixed; inset: 0; z-index: 1; }
.scene-svg { width: 100%; height: 100%; object-fit: cover; }
.rain { position: fixed; inset: 0; z-index: 2; pointer-events: none; overflow: hidden; }
.raindrop {
  position: absolute; width: 1px;
  background: linear-gradient(to bottom, transparent, rgba(180,200,220,0.22));
  animation: fall linear infinite;
}
@keyframes fall {
  0% { transform: translateY(-20px) rotate(10deg); opacity:0; }
  10% { opacity:1; }
  90% { opacity:0.3; }
  100% { transform: translateY(100vh) rotate(10deg); opacity:0; }
}
.overlay {
  position: fixed; inset: 0; z-index: 10;
  display: flex; flex-direction: column;
  align-items: flex-start; justify-content: flex-end;
  padding: 0 0 44px 36px;
  background: linear-gradient(to top, rgba(5,6,8,0.97) 0%, rgba(5,6,8,0.5) 30%, transparent 60%);
}
.num-404 {
  font-size: clamp(88px, 17vw, 190px);
  font-weight: 900; line-height: 0.85; letter-spacing: -0.04em;
  background: linear-gradient(135deg, #c8c8c8 0%, #888 40%, #c0c0c0 60%, #707070 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  animation: glitch 5s infinite;
}
@keyframes glitch {
  0%,90%,100% { transform:none; filter:none; }
  91% { transform:translate(-4px,0); filter:hue-rotate(60deg) brightness(1.2); }
  92% { transform:translate(4px,0); filter:hue-rotate(-60deg); }
  93% { transform:none; filter:none; }
  94% { transform:translate(-2px,1px); }
  95% { transform:none; }
}
.label-404 {
  font-family: 'JetBrains Mono', monospace; font-size: clamp(10px,1.4vw,13px);
  color: rgba(200,200,200,0.4); letter-spacing: 0.28em; text-transform: uppercase;
  margin-top: 6px; margin-bottom: 20px;
}
.msg-404 { font-size: clamp(14px,2.2vw,19px); color: rgba(200,200,200,0.5); font-weight:300; letter-spacing:0.04em; margin-bottom:24px; }
.msg-404 span { background: linear-gradient(135deg,#c8c8c8,#888); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; font-weight:700; }
.btn-back {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 12px 30px; background: #f4f4f4; color: #060606;
  font-family: 'Barlow Condensed', sans-serif; font-weight:800; font-size:14px;
  letter-spacing:0.1em; text-transform:uppercase; text-decoration:none; border-radius:2px;
  transition: all 0.15s;
}
.btn-back:hover { background:#c8c8c8; transform:translateY(-1px); }
</style>
</head>
